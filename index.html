<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#4CAF50">
    <link rel="manifest" href="manifest.json">
    <title>LE Mahakan - Komunitas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <h1>🏠 LE Mahakan</h1>
            <p>Komunitas UMKM Bersama</p>
        </header>

        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-number" id="totalMembers">0</div>
                <div class="stat-label">Member Aktif</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalRecipes">0</div>
                <div class="stat-label">Resep</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalProducts">0</div>
                <div class="stat-label">Produk</div>
            </div>
        </div>

        <div class="menu-grid">
            <a href="resep.html" class="menu-card">
                <div class="menu-icon">📖</div>
                <h3>Resep</h3>
                <p>Koleksi resep digital</p>
            </a>
            <a href="album.html" class="menu-card">
                <div class="menu-icon">📸</div>
                <h3>Album</h3>
                <p>Foto hasil pelatihan</p>
            </a>
            <a href="produk.html" class="menu-card">
                <div class="menu-icon">🛒</div>
                <h3>Produk</h3>
                <p>Katalog jualan member</p>
            </a>
        </div>

        <div class="announcement-section">
            <h2>📢 Pengumuman Terbaru</h2>
            <div id="announcements"></div>
        </div>

        <footer class="app-footer">
            <p>© 2025 LE Mahakan Komunitas</p>
            <p class="version">v1.0 | Made with ❤️ for UMKM</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
